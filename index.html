<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Μάντεψε το Τραγούδι | Greek Music Trivia</title>
    <style>
        :root {
            --bg-color: #050610;
            --primary-purple: #7C3AED;
            --accent-gold: #FCD34D;
        }
        
        body {
            background-color: var(--bg-color);
            /* Animated Gradient Background */
            background: linear-gradient(-45deg, #050610, #1e103d, #050610, #0c051a);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 90%;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 2rem; font-weight: 900; margin: 10px 0; letter-spacing: -0.5px; }
        p { color: rgba(255,255,255,0.6); margin-bottom: 30px; line-height: 1.5; }

        .badge-container {
            display: flex;
            flex-direction: column; /* Stack them for better mobile look */
            align-items: center;
            gap: 15px;
        }

        /* Fixed Badge Sizing */
        .badge-link img {
            height: 50px; /* Force them to same height */
            width: auto;
        }

        .badge-apple {
            height: 48px !important; /* Apple badge is tight, looks better slightly smaller */
        }

        .social-row {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        .social-row a {
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            opacity: 0.8;
        }
        
        .social-row a:hover { opacity: 1; }

    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        
        <h1>Μάντεψε το Τραγούδι</h1>
        <p>Το #1 real-time παιχνίδι ελληνικής μουσικής.<br>Δείξε σε όλους τις γνώσεις σου!</p>

        <div class="badge-container">
            <a href="https://apps.apple.com/app/idYOUR_ID" class="badge-link">
                <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/el-gr?size=250x83" class="badge-apple" alt="App Store">
            </a>
            
            <a href="https://play.google.com/store/apps/details?id=com.guessthegreek.music" class="badge-link">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Play Store">
            </a>
        </div>

        <div class="social-row">
            <a href="https://www.tiktok.com/@guessthegreekapp">TikTok</a>
            <a href="https://www.instagram.com/guess_the_greek_song/">Instagram</a>
        </div>
    </div>

</body>
</html>
